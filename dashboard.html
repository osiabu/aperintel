<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Requests | Aperintel Internal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0B0B;
    --bg-2: #111111;
    --bg-3: #171717;
    --white: #FFFFFF;
    --grey-1: #A1A1A1;
    --grey-2: #555555;
    --grey-3: #272727;
    --accent: #5B73F5;
    --accent-dim: rgba(91,115,245,0.10);
    --accent-border: rgba(91,115,245,0.28);
    --border: rgba(255,255,255,0.07);
    --border-subtle: rgba(255,255,255,0.05);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.10);
    --green-border: rgba(74,222,128,0.28);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* PASSWORD GATE */
  #gate {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .gate-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 44px 40px;
    width: 100%; max-width: 380px;
    text-align: center;
  }
  .gate-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 16px; display: block;
  }
  .gate-title { font-size: 22px; font-weight: 500; margin-bottom: 8px; letter-spacing: -0.02em; }
  .gate-sub { font-size: 14px; color: var(--grey-1); font-weight: 300; margin-bottom: 28px; }
  .gate-input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--grey-3); border-radius: 9px;
    padding: 12px 16px; font-family: var(--font);
    font-size: 15px; color: var(--white); outline: none;
    transition: border-color 0.2s; margin-bottom: 14px;
    text-align: center; letter-spacing: 0.06em;
  }
  .gate-input:focus { border-color: var(--accent-border); }
  .gate-btn {
    width: 100%; font-family: var(--font);
    font-size: 14px; font-weight: 500;
    color: #0B0B0B; background: var(--white);
    border: none; border-radius: 9px;
    padding: 13px; cursor: pointer;
    transition: opacity 0.2s;
  }
  .gate-btn:hover { opacity: 0.87; }
  .gate-error {
    font-size: 13px; color: #f87171;
    margin-top: 12px; display: none;
  }
  .gate-error.visible { display: block; }

  /* DASHBOARD */
  #dashboard { display: none; }
  #dashboard.active { display: block; }

  /* HEADER */
  .dash-nav {
    position: sticky; top: 0; z-index: 100;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    background: rgba(11,11,11,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .dash-nav-left { display: flex; align-items: center; gap: 12px; }
  .dash-nav-logo { font-size: 14px; font-weight: 500; letter-spacing: 0.04em; }
  .dash-nav-badge {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--grey-2);
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px;
  }
  .dash-nav-right { display: flex; align-items: center; gap: 12px; }
  .dash-refresh-btn {
    font-size: 12px; color: var(--grey-2);
    background: none; border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 14px;
    cursor: pointer; font-family: var(--font);
    transition: color 0.2s, border-color 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .dash-refresh-btn:hover { color: var(--white); border-color: var(--accent-border); }
  .dash-signout {
    font-size: 12px; color: var(--grey-2);
    background: none; border: none;
    cursor: pointer; font-family: var(--font);
    transition: color 0.2s; padding: 0;
  }
  .dash-signout:hover { color: var(--grey-1); }

  /* STATS BAR */
  .dash-stats {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 28px;
    background: var(--bg-2);
  }
  .dash-stat {
    padding: 16px 24px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 2px;
  }
  .dash-stat:last-child { border-right: none; }
  .dash-stat-num {
    font-size: 22px; font-weight: 500;
    letter-spacing: -0.02em; color: var(--white);
  }
  .dash-stat-label { font-size: 11px; color: var(--grey-2); font-weight: 300; letter-spacing: 0.04em; }
  .dash-stat-num.accent { color: var(--accent); }
  .dash-stat-num.green { color: var(--green); }
  .dash-stat-num.orange { color: #fb923c; }

  /* FILTER BAR */
  .dash-filter {
    display: flex; align-items: center; gap: 8px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .filter-btn {
    font-size: 12px; font-weight: 400;
    color: var(--grey-2);
    background: none; border: 1px solid var(--border);
    border-radius: 100px; padding: 5px 14px;
    cursor: pointer; font-family: var(--font);
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .filter-btn:hover { color: var(--grey-1); }
  .filter-btn.active {
    color: var(--white);
    border-color: var(--accent-border);
    background: var(--accent-dim);
  }

  /* SUBMISSIONS LIST */
  .dash-list {
    padding: 20px 28px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .dash-empty {
    text-align: center; padding: 80px 24px;
    color: var(--grey-2); font-size: 14px; font-weight: 300;
    line-height: 1.7;
  }
  .dash-loading {
    text-align: center; padding: 60px;
    color: var(--grey-2); font-size: 14px;
  }

  /* BRIEF CARD */
  .brief-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .brief-card:hover { border-color: var(--grey-3); }
  .brief-card.expanded { border-color: var(--accent-border); }

  .brief-card-header {
    display: flex; align-items: center;
    padding: 16px 20px; gap: 16px;
  }
  .brief-card-main { flex: 1; min-width: 0; }
  .brief-card-top {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 4px; flex-wrap: wrap;
  }
  .brief-ref {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent);
  }
  .brief-date { font-size: 11px; color: var(--grey-2); font-weight: 300; }
  .brief-solution-type {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 100px;
  }
  .type-aperintel { background: var(--accent-dim); color: #8096FF; border: 1px solid var(--accent-border); }
  .type-custom { background: rgba(168,85,247,0.1); color: #c084fc; border: 1px solid rgba(168,85,247,0.25); }
  .type-hybrid { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }

  .brief-card-name {
    font-size: 15px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .brief-card-client {
    font-size: 13px; color: var(--grey-1); font-weight: 300;
  }

  .brief-card-right {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 8px; flex-shrink: 0;
  }
  .status-badge {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 100px;
  }
  .status-new        { background: rgba(91,115,245,0.15); color: #8096FF; border: 1px solid rgba(91,115,245,0.3); }
  .status-in-review  { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
  .status-quoted     { background: rgba(249,115,22,0.12); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }
  .status-active     { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .status-completed  { background: rgba(100,100,100,0.15); color: #9ca3af; border: 1px solid rgba(100,100,100,0.3); }
  .status-declined   { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }

  .expand-icon {
    color: var(--grey-2); font-size: 12px;
    transition: transform 0.25s;
  }
  .brief-card.expanded .expand-icon { transform: rotate(180deg); }

  /* EXPANDED CONTENT */
  .brief-card-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 24px 20px;
    animation: fadeUp 0.25s ease both;
  }
  .brief-card.expanded .brief-card-body { display: block; }

  .body-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin-bottom: 24px;
  }
  .body-section { display: flex; flex-direction: column; gap: 8px; }
  .body-section-title {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent);
  }
  .body-section-content {
    font-size: 13.5px; color: var(--grey-1);
    font-weight: 300; line-height: 1.65;
  }

  .brief-description-block {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 9px; padding: 14px 16px;
    font-size: 13.5px; color: var(--grey-1);
    font-weight: 300; line-height: 1.7;
    white-space: pre-wrap; margin-bottom: 20px;
  }

  .req-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .req-item {
    display: flex; gap: 12px;
    padding: 12px 14px;
    background: var(--bg-3);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
  }
  .req-num {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: var(--accent);
    flex-shrink: 0; margin-top: 1px;
  }
  .req-title { font-size: 13.5px; font-weight: 500; margin-bottom: 2px; }
  .req-detail { font-size: 13px; color: var(--grey-1); font-weight: 300; line-height: 1.55; }

  /* STATUS CONTROLS */
  .status-controls {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap; padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .status-controls-label {
    font-size: 11px; color: var(--grey-2); font-weight: 300;
    letter-spacing: 0.04em; margin-right: 4px;
  }
  .status-btn {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 100px;
    cursor: pointer; font-family: var(--font);
    border: 1px solid var(--border);
    background: none; color: var(--grey-2);
    transition: all 0.2s;
  }
  .status-btn:hover { color: var(--white); border-color: var(--grey-2); }
  .status-btn.current { color: var(--white); border-color: var(--white); background: var(--bg-3); }
  .status-btn[data-status="new"]:hover           { border-color: #8096FF; color: #8096FF; }
  .status-btn[data-status="in-review"]:hover     { border-color: #fbbf24; color: #fbbf24; }
  .status-btn[data-status="quoted"]:hover        { border-color: #fb923c; color: #fb923c; }
  .status-btn[data-status="active"]:hover        { border-color: #4ade80; color: #4ade80; }
  .status-btn[data-status="completed"]:hover     { border-color: #9ca3af; color: #9ca3af; }
  .status-btn[data-status="declined"]:hover      { border-color: #f87171; color: #f87171; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  @media (max-width: 720px) {
    .dash-stats { overflow-x: auto; }
    .body-grid { grid-template-columns: 1fr; }
    .brief-card-header { flex-direction: column; align-items: flex-start; }
    .brief-card-right { flex-direction: row; align-items: center; }
  }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="gate-card">
    <span class="gate-label">Internal Access</span>
    <h1 class="gate-title">Project Dashboard</h1>
    <p class="gate-sub">Enter your team password to access submitted project briefs.</p>
    <input
      class="gate-input"
      type="password"
      id="gateInput"
      placeholder="Enter password"
      onkeydown="if(event.key==='Enter') attemptLogin()"
      autocomplete="current-password"
    >
    <button class="gate-btn" onclick="attemptLogin()">Access Dashboard</button>
    <p class="gate-error" id="gateError">Incorrect password. Please try again.</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <nav class="dash-nav">
    <div class="dash-nav-left">
      <span class="dash-nav-logo">Aperintel</span>
      <span class="dash-nav-badge">Project Requests</span>
    </div>
    <div class="dash-nav-right">
      <button class="dash-refresh-btn" onclick="loadBriefs()">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Refresh
      </button>
      <button class="dash-signout" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <div class="dash-stats" id="dashStats">
    <div class="dash-stat">
      <span class="dash-stat-num" id="statTotal">0</span>
      <span class="dash-stat-label">Total Submissions</span>
    </div>
    <div class="dash-stat">
      <span class="dash-stat-num accent" id="statNew">0</span>
      <span class="dash-stat-label">New</span>
    </div>
    <div class="dash-stat">
      <span class="dash-stat-num orange" id="statInReview">0</span>
      <span class="dash-stat-label">In Review</span>
    </div>
    <div class="dash-stat">
      <span class="dash-stat-num green" id="statActive">0</span>
      <span class="dash-stat-label">Active</span>
    </div>
  </div>

  <div class="dash-filter" id="dashFilter">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-filter="new" onclick="setFilter('new', this)">New</button>
    <button class="filter-btn" data-filter="in-review" onclick="setFilter('in-review', this)">In Review</button>
    <button class="filter-btn" data-filter="quoted" onclick="setFilter('quoted', this)">Quoted</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" data-filter="completed" onclick="setFilter('completed', this)">Completed</button>
    <button class="filter-btn" data-filter="declined" onclick="setFilter('declined', this)">Declined</button>
  </div>

  <div class="dash-list" id="dashList">
    <div class="dash-loading">Loading submissions...</div>
  </div>

</div>

<script>
let authPassword = '';
let allBriefs = [];
let currentFilter = 'all';

function attemptLogin() {
  const pw = document.getElementById('gateInput').value;
  const err = document.getElementById('gateError');

  // Try fetching with this password
  fetch('/api/briefs', {
    headers: { 'X-Dashboard-Password': pw }
  })
  .then(res => {
    if (res.status === 401) {
      err.classList.add('visible');
      document.getElementById('gateInput').value = '';
      document.getElementById('gateInput').focus();
      return null;
    }
    return res.json();
  })
  .then(data => {
    if (!data) return;
    authPassword = pw;
    err.classList.remove('visible');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    allBriefs = data.briefs || [];
    renderDashboard();
  })
  .catch(() => {
    err.textContent = 'Connection error. Please try again.';
    err.classList.add('visible');
  });
}

async function loadBriefs() {
  try {
    const res = await fetch('/api/briefs', {
      headers: { 'X-Dashboard-Password': authPassword }
    });
    const data = await res.json();
    allBriefs = data.briefs || [];
    renderDashboard();
  } catch {
    // Silently fail on refresh
  }
}

function renderDashboard() {
  // Stats
  const total = allBriefs.length;
  const newCount = allBriefs.filter(b => b.status === 'new').length;
  const inReview = allBriefs.filter(b => b.status === 'in-review').length;
  const active = allBriefs.filter(b => b.status === 'active').length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statNew').textContent = newCount;
  document.getElementById('statInReview').textContent = inReview;
  document.getElementById('statActive').textContent = active;

  // Filtered list
  const filtered = currentFilter === 'all'
    ? allBriefs
    : allBriefs.filter(b => b.status === currentFilter);

  const list = document.getElementById('dashList');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="dash-empty">No submissions found${currentFilter !== 'all' ? ' for this status' : ''}.</div>`;
    return;
  }

  list.innerHTML = filtered.map((b, idx) => buildCard(b, idx)).join('');
}

function buildCard(b, idx) {
  const dateStr = new Date(b.submittedAt).toLocaleDateString('en-GB', {
    day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
  });

  const typeClass = b.solution.solutionType === 'Aperintel Product Fit' ? 'type-aperintel'
    : b.solution.solutionType === 'Hybrid Solution' ? 'type-hybrid' : 'type-custom';

  const clientLine = [b.contact.name, b.contact.organisation].filter(Boolean).join(', ');

  const reqItems = (b.solution.brief || []).map(item => `
    <div class="req-item">
      <div class="req-num">${item.n}</div>
      <div>
        <div class="req-title">${item.title}</div>
        <div class="req-detail">${item.detail}</div>
      </div>
    </div>
  `).join('');

  const products = (b.solution.aperintelProducts || []).map(p =>
    `<span style="font-size:12px;color:var(--accent);border:1px solid var(--accent-border);background:var(--accent-dim);border-radius:100px;padding:3px 10px;">${p}</span>`
  ).join(' ');

  const statusBtns = ['new','in-review','quoted','active','completed','declined'].map(s => `
    <button class="status-btn${b.status === s ? ' current' : ''}" data-status="${s}" onclick="updateStatus('${b.reference}', '${s}', this)">
      ${s.replace('-', ' ')}
    </button>
  `).join('');

  const contextLines = Object.entries(b.context || {})
    .filter(([,v]) => v)
    .map(([k,v]) => `${k}: ${v}`)
    .join(' · ');

  return `
    <div class="brief-card" id="card-${b.reference}" onclick="toggleCard('${b.reference}')">
      <div class="brief-card-header">
        <div class="brief-card-main">
          <div class="brief-card-top">
            <span class="brief-ref">${b.reference}</span>
            <span class="brief-date">${dateStr}</span>
            <span class="brief-solution-type ${typeClass}">${b.solution.solutionType || 'Custom'}</span>
          </div>
          <div class="brief-card-name">${b.solution.solutionName || 'Untitled'}</div>
          <div class="brief-card-client">${clientLine}</div>
        </div>
        <div class="brief-card-right">
          <span class="status-badge status-${b.status}">${b.status.replace('-', ' ')}</span>
          <span class="expand-icon">↓</span>
        </div>
      </div>

      <div class="brief-card-body">

        <div class="body-grid" style="margin-bottom:16px;">
          <div class="body-section">
            <span class="body-section-title">Client</span>
            <div class="body-section-content">
              <strong>${b.contact.name}</strong><br>
              ${b.contact.email}<br>
              ${b.contact.organisation ? b.contact.organisation + '<br>' : ''}
              ${b.contact.notes ? '<em style="color:var(--grey-2);">"' + b.contact.notes + '"</em>' : ''}
            </div>
          </div>
          <div class="body-section">
            <span class="body-section-title">Context</span>
            <div class="body-section-content">${contextLines || 'No additional context provided.'}</div>
          </div>
        </div>

        <div class="body-section" style="margin-bottom:16px;">
          <span class="body-section-title">Original Description</span>
          <div class="brief-description-block">${(b.originalDescription || '').substring(0, 600)}${(b.originalDescription || '').length > 600 ? '...' : ''}</div>
        </div>

        <div class="body-section" style="margin-bottom:16px;">
          <span class="body-section-title">Solution Overview</span>
          <div class="body-section-content">${b.solution.solutionDescription || ''}</div>
          ${products ? `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">${products}</div>` : ''}
        </div>

        <div class="body-section" style="margin-bottom:16px;">
          <span class="body-section-title">Project Requirements (${(b.solution.brief || []).length})</span>
          <div class="req-list">${reqItems}</div>
        </div>

        <div class="body-grid" style="margin-bottom:16px;">
          <div class="body-section">
            <span class="body-section-title">Timeline</span>
            <div class="body-section-content">${b.solution.timeline || 'Not specified'}</div>
          </div>
          <div class="body-section">
            <span class="body-section-title">Deliverables</span>
            <div class="body-section-content">${(b.solution.deliverables || []).map(d => '• ' + d).join('<br>')}</div>
          </div>
        </div>

        <div class="status-controls" onclick="event.stopPropagation()">
          <span class="status-controls-label">Update status:</span>
          ${statusBtns}
        </div>
      </div>
    </div>
  `;
}

function toggleCard(ref) {
  const card = document.getElementById('card-' + ref);
  card.classList.toggle('expanded');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDashboard();
}

async function updateStatus(reference, status, btn) {
  try {
    const res = await fetch('/api/briefs', {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'X-Dashboard-Password': authPassword
      },
      body: JSON.stringify({ reference, status })
    });

    if (!res.ok) throw new Error();

    // Update local data
    const brief = allBriefs.find(b => b.reference === reference);
    if (brief) brief.status = status;

    // Re-render the card area
    const card = document.getElementById('card-' + reference);
    const wasExpanded = card.classList.contains('expanded');

    // Rebuild stats
    renderDashboard();

    // Re-expand if was open
    if (wasExpanded) {
      setTimeout(() => {
        const newCard = document.getElementById('card-' + reference);
        if (newCard) newCard.classList.add('expanded');
      }, 50);
    }

  } catch {
    alert('Failed to update status. Please try again.');
  }
}

function signOut() {
  authPassword = '';
  allBriefs = [];
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('gate').style.display = '';
  document.getElementById('gateInput').value = '';
}
</script>
</body>
</html>
